<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Meena Mam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>
    <div id="intro-screen" class="intro-overlay">
        <h1 class="netflix-logo">FAREWELL</h1>
    </div>
    <div id="profile-screen" class="hidden">
        <div class="profile-container">
            <h1>Who is watching?</h1>
            <div class="profile-gate">
                <div class="profile-card" onclick="showSection('teacher')">
                    <div class="img-wrapper"><img src="teacher.jpg" alt="Teacher"></div>
                    <p>Meena Mam ❤️</p>
                </div>
                <div class="profile-card" onclick="showSection('class')">
                    <div class="img-wrapper"><img src="class.jpg" alt="Class"></div>
                    <p>Our Class 🎓</p>
                </div>
                <div class="profile-card" onclick="showSection('memories')">
                    <div class="img-wrapper"><img src="memories.jpg" alt="Memories"></div>
                    <p>Memories 📸</p>
                </div>
            </div>
        </div>
    </div>
    <main id="main-content" class="hidden">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <section id="teacher" class="content-section hidden">
            <h2 id="typing-msg"></h2>
            <div class="glass-card"><p>To the best teacher ever... we will miss you!</p></div>
        </section>
        <section id="class" class="content-section hidden"><h2>The Best Batch</h2><div class="class-grid"><div class="glass-card">Final Day 2026</div></div></section>
        <section id="memories" class="content-section hidden"><h2>Gallery</h2><div class="gallery-info">Add your photos here!</div></section>
    </main>
    <script src="script.js"></script>
</body>
</html>
